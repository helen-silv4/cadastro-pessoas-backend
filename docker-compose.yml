services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cadastro-sqlserver
    environment:
      SA_PASSWORD: "Cadastro@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Cadastro@123' -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    command: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S db,1433 -U sa -P 'Cadastro@123' -No
      -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'cadastro_pessoas') CREATE DATABASE cadastro_pessoas\"
      "
    restart: "no"

  backend:
    build: .
    container_name: cadastro-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://db:1433;databaseName=cadastro_pessoas;encrypt=false
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: Cadastro@123
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: on-failure

  frontend:
    build: ../frontend
    container_name: cadastro-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  sqlserver_data: